version: '3.8'

services:
  backend:
    container_name: api-backend
    build:
      context: ./API
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ./API/uploads:/usr/src/app/uploads    # Volume for uploads
      - ./API/logs:/usr/src/app/logs    
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=@numberoneOFschool01
      - DB_NAME=dailychineseclass
    depends_on:
      - db

  frontend:
    container_name: web-frontend
    build:
      context: ./WEB
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:stable-alpine
    container_name: nginx-server
    ports:
      - "80:80"
      - "443:443"
    restart: always
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./API/uploads:/var/www/backend/uploads
      - ./API/logs:/var/www/backend/logs
      - ./certbot/www:/var/www/certbot/:ro
      - ./certbot/conf:/etc/letsencrypt/:ro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www:/var/www/certbot/:rw
      - ./certbot/conf:/etc/letsencrypt/:rw
    entrypoint: >
      sh -c "mkdir -p /var/www/certbot/ && certbot certonly
      --webroot
      --webroot-path=/var/www/certbot/
      --email dailychineseclass01@gmail.com
      --agree-tos
      --no-eff-email
      -d goalchinesedoc.com"

  db:
    container_name: mysql-db
    image: mysql:latest
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=@numberoneOFschool01
      - MYSQL_DATABASE=dailychineseclass
    volumes:
      - ./db_data:/var/lib/mysql

volumes:
  db_data:

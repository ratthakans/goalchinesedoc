version: '3.8'

services:
  web:
    build:
      context: ./WEB
      dockerfile: Dockerfile.dev
    ports:
      - "8080:3000"
    volumes:
      - ./WEB/src:/app/src
    develop:
      watch:
        - action: sync+restart
          path: ./WEB
          target: /app
          ignore:
            - node_modules
    environment:
      - NODE_ENV=development


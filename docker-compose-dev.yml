version: '3.8'

services:
  web:
    build:
      context: ./WEB
      dockerfile: Dockerfile.dev
    ports:
      - "8080:3000"
    volumes:
      - ./WEB/src:/app/src
    develop:
      watch:
        - action: sync+restart
          path: ./WEB
          target: /app
          ignore:
            - node_modules
    environment:
      - NODE_ENV=development

api:
    build: ./API
    dockerfile: Dockerfile
    ports:
      - "3000:3000"
      depends_on:
        - db
    volumes:
      - ./API:/usr/src/app
    environment:
      - NODE_ENV=development
    restart: always

  db:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: my-strong-password
    volumes:
      - db_data:/var/lib/mysql 
volumes:
  db_data:
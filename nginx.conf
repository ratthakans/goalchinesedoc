server {
    listen 80;
    listen [::]:80;

    server_name goalchinesedoc.com www.goalchinesedoc.com;
    
    # Increase max body size for file uploads
    client_max_body_size 100M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot/;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}


server {
    listen 443 default_server ssl http2;
    listen [::]:443 ssl http2;

    server_name goalchinesedoc.com;

     # SSL certificates
    ssl_certificate /etc/letsencrypt/live/goalchinesedoc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goalchinesedoc.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Serve Vue.js frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy backend API
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploaded files
    location /uploads/ {
        alias /var/www/backend/uploads/;
        autoindex on; # Optional: Enable directory browsing
    }

    # Serve logs (restricted to localhost)
    location /logs/ {
        alias /var/www/backend/logs/;
        autoindex on;
    }

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_vary on;
}

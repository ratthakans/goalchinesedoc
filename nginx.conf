# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;

    server_name goalchinesedoc.com www.goalchinesedoc.com;

    # สำหรับ certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name goalchinesedoc.com www.goalchinesedoc.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/goalchinesedoc.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goalchinesedoc.com-0001/privkey.pem;


    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 100M;

    # frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # backend api
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # uploads
    location /uploads/ {
        alias /var/www/backend/uploads/;
        autoindex off;
    }

    # logs (local only)
    location /logs/ {
        alias /var/www/backend/logs/;
        autoindex off;
        allow 127.0.0.1;
        deny all;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_vary on;
}

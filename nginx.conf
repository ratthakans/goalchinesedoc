server {
    listen 80;

    # Increase max body size for file uploads
    client_max_body_size 100M;
    
    # Serve Vue.js frontend
    location / {
        proxy_pass http://frontend:80; # Proxy to frontend service
    }

    # Proxy backend API
    location /api/ {
        proxy_pass http://backend:3000; # Proxy to backend service
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploaded files
    location /uploads/ {
        alias /var/www/backend/uploads/;
        autoindex on; # Optional: Enable directory browsing
    }

    # Serve logs (restricted to localhost)
    location /logs/ {
        alias /var/www/backend/logs/;
        autoindex on;
    }

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_vary on;
}

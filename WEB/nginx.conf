server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Proxy requests to the backend API
    location /api/ {
        proxy_pass http://backend:3000; # Backend service or container name
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve static files from the uploads directory
    location /uploads/ {
        root /var/www/Webgoalchinese/API/uploads/;
        autoindex on; # Optional: Enable directory browsing
        add_header Cache-Control "public, max-age=31536000"; # Cache static files
    }

    # Serve logs as static files (optional, for debugging)
    location /logs/ {
        root /var/www/Webgoalchinese/API/logs/;
        autoindex on; # Optional: Enable directory browsing
        add_header Cache-Control "public, max-age=31536000"; # Cache static files
    }

    # Enable gzip compression
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss image/svg+xml;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_min_length 1024;
}
